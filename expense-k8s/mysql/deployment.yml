apiVersion: v1
kind: Deployment
metadata:
  name: mysql
  namespace: expense
  labels:
    app: expense-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: expense-app
  template:
    metadata:
      labels:
        app: expense-app
    spec:
      containers:
      - name: mysql-container
        image: kishoreking90/mysql:v1
        ports:
        - containerPort: 3306
